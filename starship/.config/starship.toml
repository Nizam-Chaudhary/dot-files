format = """\
[в•ӯв•ҙ](fg:arrow)\
$os\
$username \
$git_branch\
(\
    at \
    $directory\
)\
$fill $cmd_duration $time\
(\
    via \
    $python\
    $conda\
    $nodejs\
    $c\
    $rust\
    $java\
)
[в•°в”Җ](fg:arrow)$character\
"""
# Add the modules you need

# Disable the blank line at the start of the prompt
add_newline = true

palette = "normal"

[palettes.normal]
arrow = "#B3BCFD"
os = "#B3BCFD"
os_admin = "#B3BCFD"
directory = "#B3BCFD"
time = "#B3BCFD"
node = "#a5e6ba"
git = "#f17f29"
git_status = "#DFEBED"
python = "#edf67d"
conda = "#70e000"
java = "#F86279"
rust = "#ffdac6"
clang = "#caf0f8"
duration = "#ce4257"
text_color = "#EDF2F4"
text_light = "#26272A"

[username]
style_user = 'bold os'
style_root = 'bold os_admin'
format = '[$user](fg:$style)'
disabled = false
show_always = true

[os]
# format = "$symbol on [($name)]($style) "
format = "$symbol "
style = "bold blue"
disabled = false

[os.symbols]
Alpine = "пҢҖ "
Arch = "пҢғ "
Debian = "пҢҶ "
EndeavourOS = "пҶ— "
Fedora = "пҢҠ "
Linux = "пҢҡ "
Macos = "пҢӮ "
Manjaro = "пҢ’ "
Mint = "пҢҺ "
NixOS = "пҢ“ "
openSUSE = "пҢ” "
Pop = "оҠЈ "
SUSE = "пҢ” "
Ubuntu = "пҢӣ "
Windows = "п…ә "

[character]
success_symbol = "[у°Қҹ](fg:arrow)"
error_symbol = "[у°Қҹ](fg:red)"

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
truncation_length = 2
style = "fg:directory"
read_only_style = "fg:directory"
before_repo_root_style = "fg:directory"
truncation_symbol = "вҖҰ/"
truncate_to_repo = true
read_only =" о©ө "

[time]
disabled = false
format = "[уұ‘Ҳ $time]($style)"
time_format = "%H:%M"
style = "bold fg:time"



[cmd_duration]
disabled = false
format = "took [п“Ј $duration]($style) "
style = "bold fg:duration"
min_time = 500

[git_branch]
format = "via [$symbol$branch]($style) "
style = "bold fg:git"
symbol = "оңӮ "

[git_status]
format = '[ $all_status$ahead_behind ]($style)'
style = "fg:text_color bg:git"
disabled = true

[docker_context]
disabled=false
symbol = "пҢҲ "

[package]
disabled=false

[fill]
symbol = " "

[nodejs]
format = "[ $symbol$version ]($style)"
style = "bg:node fg:text_light"
symbol = "оңҳ "
version_format = "${raw}"
disabled=false

[python]
disabled=false
format = '[ ${symbol}${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = "оҳҶ "
version_format = "${raw}"
style = "bg:python fg:text_light"

[conda]
format = "[ $symbol$environment ]($style)"
style = "bg:conda fg:text_light"
ignore_base = false
disabled = false
symbol = "п„Ң "

[java]
format = "[ $symbol$version ]($style)"
style = "bg:java fg:text_light"
version_format = "${raw}"
symbol = "оҷӯ "
disabled = false

[c]
format = "[ $symbol($version(-$name)) ]($style)"
style = "bg:clang fg:text_light"
symbol = "оҳһ "
version_format = "${raw}"
disabled=false

[rust]
format ="[ $symbol$version ]($style)"
style = "bg:rust fg:text_light"
symbol = "оҡӢ "
version_format = "${raw}"
disabled=false
