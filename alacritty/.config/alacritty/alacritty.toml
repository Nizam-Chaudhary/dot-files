
#### THEME ####
import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

##### GENERAL #####
[env]
WINIT_X11_SCALE_FACTOR = "1"

[window]
decorations = "full"
decorations_theme_variant = "Dark"
dynamic_padding = true
opacity = 0.95
startup_mode = "Maximized"

[window.dimensions]
columns = 100
lines = 30

[window.padding]
x = 10
y = 6

[window.class]
instance = "Alacritty"
general = "Alacritty"

[scrolling]
history = 10000
multiplier = 3

[font]
size = 12

[font.normal]
family = "JetBrains Mono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "JetBrains Mono Nerd Font Mono"
style = "Bold Italic"

[colors]
draw_bold_text_with_bright_colors = true

[selection]
save_to_clipboard = true
