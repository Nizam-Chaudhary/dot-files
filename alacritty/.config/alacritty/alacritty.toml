
#### THEME ####
import = [
  "~/.config/alacritty/vesper.toml"
]

##### GENERAL #####
[env]
WINIT_X11_SCALE_FACTOR = "1"

[window]
decorations = "full"
decorations_theme_variant = "Dark"
dynamic_padding = true
opacity = 0.95
startup_mode = "Maximized"

[window.dimensions]
columns = 100
lines = 30

[window.padding]
x = 10
y = 6

[window.class]
instance = "Alacritty"
general = "Alacritty"

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "CaskaydiaCove Nerd Font Mono", style = "Regular" }
bold = { family = "CaskaydiaCove Nerd Font Mono", style = "Bold" }
italic = { family = "CaskaydiaCove Nerd Font Mono", style = "Italic" }
bold_italic = { family = "CaskaydiaCove Nerd Font Mono", style = "Bold Italic" }
size = 15

[colors]
draw_bold_text_with_bright_colors = true

[selection]
save_to_clipboard = true
