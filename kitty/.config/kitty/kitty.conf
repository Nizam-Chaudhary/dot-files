# ===============================
# 🐱 Kitty Terminal Configuration
# Theme: Catppuccin Mocha
# ===============================

# ----- Theme -----
# Using Catppuccin Mocha theme (managed via current-theme.conf include)
# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME


# ----- Terminal Settings -----
term xterm-256color


# ----- Fonts -----
font_family      CaskaydiaCove Nerd Font Mono
bold_font        CaskaydiaCove Nerd Font Mono Bold
italic_font      CaskaydiaCove Nerd Font Mono Italic
bold_italic_font CaskaydiaCove Nerd Font Mono Bold Italic
font_size 14.0


# ----- Window / Layout -----
remember_window_size  yes
initial_window_width  840
initial_window_height 600

window_border_width 2.0pt
window_margin_width 8


# ----- Tabs -----
tab_bar_style powerline
tab_powerline_style round
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
tab_bar_min_tabs 1


# ----- Background -----
background_opacity 0.95


# ----- Keybindings -----
map kitty_mod+t     new_tab_with_cwd
map kitty_mod+enter new_window_with_cwd
map kitty_mod+k     clear_terminal reset active
map ctrl+l          clear_terminal scroll active
