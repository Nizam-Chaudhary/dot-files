# ===============================
# 🐱 Kitty Terminal Configuration
# Theme: Catppuccin Mocha
# ===============================

# ----- Theme -----
# Using Catppuccin Mocha theme (managed via current-theme.conf include)
# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME


# ----- Terminal Settings -----
term xterm-256color


# ----- Fonts -----
font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono Bold
italic_font      JetBrainsMono Nerd Font Mono Italic
bold_italic_font JetBrainsMono Nerd Font Mono Bold Italic
font_size 12.0


# ----- Window / Layout -----
remember_window_size  yes
initial_window_width  840
initial_window_height 600

# Border & padding (tight for tmux)
window_border_width 1.0pt
window_margin_width 4
window_padding_width 2


# ----- Tabs -----
tab_bar_style powerline
tab_powerline_style round

# Show tab bar only when there are 2 or more tabs
tab_bar_min_tabs 2
hide_window_decorations yes

# Title format:
# [folder] command
tab_title_template {cwd_basename} {exe}
active_tab_title_template {cwd_basename} {exe}

# ----- Background -----
background_opacity 0.88

# Enable blur (Wayland / supported compositors)
background_blur 20


# ----- Performance / UX -----
repaint_delay 10
input_delay 3
sync_to_monitor yes


# ----- Keybindings -----
map kitty_mod+t     new_tab_with_cwd
map kitty_mod+enter new_window_with_cwd
map kitty_mod+k     clear_terminal reset active
map ctrl+l          clear_terminal scroll active
