# ===============================
# 🐱 Kitty Terminal Configuration
# Theme: Catppuccin Mocha
# ===============================

# ----- Theme -----
# Using Catppuccin Mocha theme (managed via current-theme.conf include)
# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME


# ----- Terminal Settings -----
term xterm-256color


# ----- Fonts -----
font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono NFM Bold
italic_font      JetBrainsMono NFM Italic
bold_italic_font JetBrainsMono NFM Bold Italic
font_size 12.0


# ----- Window / Layout -----
remember_window_size  yes

# Start in fullscreen (change to "maximized" if preferred)
startup_session ~/.config/kitty/sessions/max.conf

# Border & padding (tight for tmux)
window_border_width 1.0pt
window_margin_width 4
window_padding_width 2

# Remove OS window decorations
hide_window_decorations yes

# Disable close confirmation dialog
confirm_os_window_close 0


# ----- Tabs -----
tab_bar_style powerline
tab_powerline_style round

# Show tab bar only when there are 2 or more tabs
tab_bar_min_tabs 2

# Title format: [folder] command
tab_title_template {cwd_basename} {exe}
active_tab_title_template {cwd_basename} {exe}


# ----- Background -----
# Transparency
background_opacity 0.88

# Blur (Wayland or compositor required)
background_blur 20


# ----- Performance / UX -----
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Disable bells (clean UX)
enable_audio_bell no
visual_bell_duration 0
bell_on_tab no


# ----- Keybindings -----
map kitty_mod+t     new_tab_with_cwd
map kitty_mod+enter new_window_with_cwd
map kitty_mod+k     clear_terminal reset active
map ctrl+l          clear_terminal scroll active
